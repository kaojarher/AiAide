<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Puter AI 智能助理工具</title>
<script src="https://js.puter.com/v2/"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap');

  :root {
    --bg: #080c10;
    --surface: #0f1419;
    --surface2: #161d26;
    --border: #1e2a38;
    --accent: #1a8cff;
    --accent2: #00c4b4;
    --accent3: #8ab4f8;
    --text: #e3eaf4;
    --text-muted: #5a7a99;
    --success: #1de9b6;
    --error: #ff5252;
    --puter-purple: #7c3aed;
    --puter-indigo: #4f46e5;
    --puter-cyan: #06b6d4;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans TC', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 48px 20px;
    background-image:
      radial-gradient(ellipse 80% 40% at 50% -10%, rgba(124,58,237,0.12) 0%, transparent 70%),
      radial-gradient(ellipse 40% 30% at 80% 80%, rgba(6,182,212,0.07) 0%, transparent 60%);
  }

  /* ── Header ── */
  .container { width: 100%; max-width: 980px; }

  header { text-align: center; margin-bottom: 44px; }

  .logo-wrap {
    display: inline-flex; align-items: center; gap: 14px;
    margin-bottom: 14px;
  }

  .puter-icon {
    width: 44px; height: 44px;
    background: conic-gradient(from 135deg, #7c3aed, #06b6d4, #7c3aed);
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
    box-shadow: 0 0 24px rgba(124,58,237,0.4);
    animation: pulseGlow 3s ease-in-out infinite;
  }

  @keyframes pulseGlow {
    0%, 100% { box-shadow: 0 0 24px rgba(124,58,237,0.4); }
    50%       { box-shadow: 0 0 40px rgba(6,182,212,0.5); }
  }

  h1 {
    font-size: 2.4rem; font-weight: 700;
    background: linear-gradient(120deg, #a78bfa 0%, #06b6d4 60%, #7c3aed 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    letter-spacing: -0.5px;
  }

  .badge-row { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; margin-top: 6px; }
  .badge {
    background: var(--surface2); padding: 4px 14px; border-radius: 20px;
    font-size: 0.78rem; color: var(--accent3); border: 1px solid var(--border);
    font-family: 'DM Mono', monospace;
  }

  /* ── Card ── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 30px;
    box-shadow: 0 24px 48px rgba(0,0,0,0.5);
    margin-bottom: 24px;
    position: relative; overflow: hidden;
  }
  .card::before {
    content: '';
    position: absolute; top: 0; left: 0; width: 100%; height: 3px;
    background: linear-gradient(90deg, var(--puter-purple), var(--puter-cyan), var(--puter-purple));
    background-size: 200% 100%;
    animation: shimmer 4s linear infinite;
  }
  @keyframes shimmer { to { background-position: -200% 0; } }

  /* ── Info banner ── */
  .info-banner {
    background: rgba(124,58,237,0.08);
    border: 1px solid rgba(124,58,237,0.25);
    border-radius: 12px;
    padding: 12px 18px;
    font-size: 0.85rem;
    color: #c4b5fd;
    margin-bottom: 24px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  /* ── Grid ── */
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
  @media (max-width: 680px) { .grid { grid-template-columns: 1fr; } }

  label {
    display: block; font-size: 0.85rem; font-weight: 500;
    color: var(--text-muted); margin-bottom: 8px; margin-left: 2px;
    letter-spacing: 0.3px;
  }

  textarea, select, input {
    width: 100%; background: var(--surface2); border: 1px solid var(--border);
    border-radius: 12px; color: var(--text); padding: 13px 16px;
    font-size: 0.97rem; transition: border-color 0.25s, box-shadow 0.25s;
    font-family: inherit;
  }
  textarea:focus, select:focus, input:focus {
    outline: none; border-color: var(--puter-purple);
    box-shadow: 0 0 0 3px rgba(124,58,237,0.15);
  }
  textarea { min-height: 110px; line-height: 1.65; resize: vertical; }

  select option { background: var(--surface2); }

  /* ── Capability chips ── */
  .caps { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; }
  .cap-chip {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 8px; padding: 4px 12px; font-size: 0.78rem;
    color: var(--text-muted); font-family: 'DM Mono', monospace;
    cursor: pointer; transition: all 0.2s; user-select: none;
  }
  .cap-chip:hover, .cap-chip.active {
    border-color: var(--puter-cyan); color: var(--puter-cyan);
    background: rgba(6,182,212,0.08);
  }

  /* ── Run button ── */
  .btn-primary {
    width: 100%;
    background: linear-gradient(135deg, var(--puter-purple), var(--puter-cyan));
    color: white; border: none; padding: 15px;
    border-radius: 12px; font-size: 1.05rem; font-weight: 600;
    cursor: pointer; transition: transform 0.2s, box-shadow 0.2s, opacity 0.2s;
    margin-top: 8px; letter-spacing: 0.3px;
    position: relative; overflow: hidden;
  }
  .btn-primary::after {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.1), transparent);
    opacity: 0; transition: opacity 0.2s;
  }
  .btn-primary:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 10px 28px rgba(124,58,237,0.35); }
  .btn-primary:hover:not(:disabled)::after { opacity: 1; }
  .btn-primary:disabled { opacity: 0.55; cursor: not-allowed; transform: none; }

  /* ── Thinking animation ── */
  .thinking-dots span {
    display: inline-block; animation: bounce 1.2s infinite;
  }
  .thinking-dots span:nth-child(2) { animation-delay: 0.2s; }
  .thinking-dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%,80%,100% { transform: translateY(0); } 40% { transform: translateY(-4px); } }

  /* ── Response ── */
  #response-section { display: none; }

  .response-header {
    display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px;
  }
  .status-tag { display: flex; align-items: center; gap: 8px; font-size: 0.83rem; font-weight: 500; }
  .status-ok  { color: var(--success); }
  .status-err { color: var(--error); }

  .response-box {
    background: #0a0e14;
    border: 1px solid var(--border);
    border-radius: 14px; padding: 22px 24px;
    font-size: 1rem; line-height: 1.85;
    white-space: pre-wrap; color: #dde8f5;
    max-height: 560px; overflow-y: auto;
    scroll-behavior: smooth;
    font-family: 'Noto Sans TC', sans-serif;
  }
  .response-box::-webkit-scrollbar { width: 6px; }
  .response-box::-webkit-scrollbar-track { background: transparent; }
  .response-box::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* token counter */
  .token-bar {
    display: flex; justify-content: flex-end; gap: 16px;
    margin-top: 10px; font-size: 0.76rem;
    font-family: 'DM Mono', monospace; color: var(--text-muted);
  }

  /* ── URL preview ── */
  .url-preview {
    background: #06080d; border-radius: 8px; padding: 10px 14px;
    font-family: 'DM Mono', monospace; font-size: 0.72rem;
    color: var(--text-muted); word-break: break-all;
    margin-top: 18px; border: 1px dashed var(--border);
  }

  /* ── Action row ── */
  .action-row { display: flex; gap: 10px; margin-top: 14px; }
  .btn-sec {
    flex: 1; background: var(--surface2); color: var(--text-muted);
    border: 1px solid var(--border); padding: 10px;
    border-radius: 10px; font-size: 0.85rem; cursor: pointer;
    transition: all 0.2s;
  }
  .btn-sec:hover { border-color: var(--accent3); color: var(--accent3); }
</style>
</head>
<body>

<div class="container">
  <header>
    <div class="logo-wrap">
      <div class="puter-icon">⚡</div>
      <h1>Puter AI 智能助理</h1>
    </div>
    <div class="badge-row">
      <span class="badge">Engine v1.0</span>
      <span class="badge">Puter.js AI SDK</span>
      <span class="badge">Streaming ✓</span>
      <span class="badge">免費使用 ✓</span>
    </div>
  </header>

  <!-- Config card -->
  <div class="card">

    <!-- Info Banner -->
    <div class="info-banner">
      ⚡ Puter AI 無需 API Key，透過 Puter.js 免費調用 GPT-4o 等模型，直接在瀏覽器中運行。
    </div>

    <!-- Model + Temp -->
    <div class="grid">
      <div>
        <label>模型選擇</label>
        <select id="model">
          <option value="gpt-4o">GPT-4o</option>
          <option value="gpt-4o-mini">GPT-4o Mini</option>
          <option value="o1-mini">o1-mini</option>
          <option value="claude-sonnet-4-20250514">Claude Sonnet 4</option>
          <option value="claude-haiku-4-5">Claude Haiku 4.5</option>
          <option value="gemini-2.0-flash">Gemini 2.0 Flash</option>
          <option value="meta-llama/Meta-Llama-3.1-8B-Instruct-Turbo">Llama 3.1 8B</option>
          <option value="meta-llama/Meta-Llama-3.1-70B-Instruct-Turbo">Llama 3.1 70B</option>
          <option value="mistral-large-latest">Mistral Large</option>
        </select>
      </div>
      <div>
        <label>創意溫度 (Temperature)</label>
        <input type="number" id="temp" value="0.7" step="0.1" min="0" max="2">
      </div>
    </div>

    <!-- Capability chips -->
    <label>快速場景 (點選填入 System Prompt)</label>
    <div class="caps">
      <span class="cap-chip" onclick="setScene('professional_secretary')">📋 專業秘書</span>
      <span class="cap-chip" onclick="setScene('code_reviewer')">💻 代碼審查</span>
      <span class="cap-chip" onclick="setScene('meeting_summary')">📝 會議摘要</span>
      <span class="cap-chip" onclick="setScene('translator')">🌐 中英翻譯</span>
      <span class="cap-chip" onclick="setScene('analyst')">📊 資料分析師</span>
      <span class="cap-chip" onclick="setScene('none')">🚫 無系統指令</span>
    </div>

    <!-- System + Prompt -->
    <label>系統指令 (System Prompt)</label>
    <textarea id="system" placeholder="定義 AI 的角色（例如：你是一位專業秘書，善用條列式回答...）" style="margin-bottom:16px;"></textarea>

    <label>使用者輸入 (User Prompt)</label>
    <textarea id="prompt" placeholder="請輸入問題、文字或逐字稿內容..."></textarea>

    <button class="btn-primary" id="run-btn" onclick="runQuery()">
      ⚡ 執行 Puter AI 查詢
    </button>

    <div class="url-preview" id="url-preview">
      支援 URL 參數: ?prompt=...&system=...&model=...&autorun=1
    </div>
  </div>

  <!-- Response card -->
  <div id="response-section" class="card">
    <div class="response-header">
      <div class="status-tag" id="status-tag">準備就緒</div>
      <div style="display:flex;gap:10px;">
        <button onclick="copyResult()" class="btn-sec" style="flex:unset;padding:6px 14px;font-size:0.8rem;">📋 複製</button>
        <button onclick="clearAll()" style="background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:0.85rem;">✕ 清除</button>
      </div>
    </div>
    <div id="response-content" class="response-box"></div>
    <div class="token-bar" id="token-bar"></div>
  </div>
</div>

<script>
// ── 場景預設 ──
const SCENES = {
  professional_secretary: '你是一位經驗豐富的專業秘書，擅長整理資訊、條列重點，回答簡潔清晰，語氣專業友善。',
  code_reviewer: '你是一位資深軟體工程師，專注於代碼品質、安全性與可維護性，請提供具體改善建議。',
  meeting_summary: '你是一位會議記錄專家，請將輸入的逐字稿整理成：【決議事項】【行動項目（含負責人與期限）】【待確認事項】三個區塊。',
  translator: '你是一位專業中英翻譯，請將輸入內容翻譯為對應語言（中文→英文，英文→中文），保持原意並使用自然流暢的表達。',
  analyst: '你是一位資料分析師，善用數字、圖表描述與洞察，回答時結構清晰，從資料中挖掘關鍵趨勢與建議。',
  none: ''
};

function setScene(key) {
  document.getElementById('system').value = SCENES[key];
  document.querySelectorAll('.cap-chip').forEach(c => c.classList.remove('active'));
  event.target.classList.add('active');
  updateUrlPreview();
}

// ── URL 參數 ──
function updateUrlPreview() {
  const p = encodeURIComponent((document.getElementById('prompt').value || '').substring(0, 50));
  const s = encodeURIComponent((document.getElementById('system').value || '').substring(0, 30));
  const m = document.getElementById('model').value;
  document.getElementById('url-preview').textContent =
    `${location.origin}${location.pathname}?prompt=${p}...&system=${s}...&model=${m}&autorun=1`;
}

function loadFromUrl() {
  const params = new URLSearchParams(location.search);
  if (params.has('prompt')) document.getElementById('prompt').value = params.get('prompt');
  if (params.has('system')) document.getElementById('system').value = params.get('system');
  if (params.has('model'))  document.getElementById('model').value  = params.get('model');
  if (params.has('temp'))   document.getElementById('temp').value   = params.get('temp');
  if (params.get('autorun') === '1') setTimeout(runQuery, 600);
}

// ── 主查詢 (Puter AI + Streaming) ──
async function runQuery() {
  const prompt  = document.getElementById('prompt').value.trim();
  const system  = document.getElementById('system').value.trim();
  const model   = document.getElementById('model').value;

  if (!prompt) { alert('請輸入 Prompt 內容'); return; }

  const btn       = document.getElementById('run-btn');
  const section   = document.getElementById('response-section');
  const content   = document.getElementById('response-content');
  const statusTag = document.getElementById('status-tag');
  const tokenBar  = document.getElementById('token-bar');

  btn.disabled = true;
  btn.innerHTML = '思考中 <span class="thinking-dots"><span>.</span><span>.</span><span>.</span></span>';
  section.style.display = 'block';
  content.textContent   = '';
  tokenBar.textContent  = '';
  statusTag.textContent = '● Puter AI 連線中...';
  statusTag.className   = 'status-tag';

  const startTime = Date.now();

  // 組合 messages：若有 system prompt，放入第一條
  const messages = [];
  if (system) {
    messages.push({ role: 'system', content: system });
  }
  messages.push({ role: 'user', content: prompt });

  let fullText = '';

  try {
    // puter.ai.chat 支援 streaming，回傳 AsyncGenerator
    const response = await puter.ai.chat(messages, {
      model: model,
      stream: true,
    });

    // 逐 chunk 累加
    for await (const part of response) {
      const delta = part?.text ?? '';
      fullText += delta;
      content.textContent = fullText;
      content.scrollTop   = content.scrollHeight;
    }

    const elapsed = ((Date.now() - startTime) / 1000).toFixed(1);
    statusTag.textContent = `⚡ 完成 · ${elapsed}s · ${model}`;
    statusTag.className   = 'status-tag status-ok';
    tokenBar.innerHTML    = `<span>模型: ${model}</span><span>耗時: ${elapsed}s</span>`;

    // postMessage 回傳（相容原版 opener 架構）
    if (window.opener) {
      window.opener.postMessage({ type: 'AI_RESULT_COMPLETE', content: fullText, model }, '*');
    }

  } catch (err) {
    content.textContent   = `❌ 錯誤：${err.message}`;
    statusTag.textContent = '✗ 請求失敗';
    statusTag.className   = 'status-tag status-err';
  } finally {
    btn.disabled = false;
    btn.innerHTML = '⚡ 執行 Puter AI 查詢';
  }
}

// ── 複製結果 ──
async function copyResult() {
  const text = document.getElementById('response-content').textContent;
  if (!text) return;
  await navigator.clipboard.writeText(text).catch(() => {});
  const btn = event.target;
  btn.textContent = '✓ 已複製';
  setTimeout(() => { btn.textContent = '📋 複製'; }, 1800);
}

// ── 清除 ──
function clearAll() {
  document.getElementById('prompt').value = '';
  document.getElementById('system').value = '';
  document.getElementById('response-section').style.display = 'none';
  document.querySelectorAll('.cap-chip').forEach(c => c.classList.remove('active'));
  updateUrlPreview();
}

// ── 監聽跨視窗指令 ──
window.addEventListener('message', function(event) {
  if (event.data.type === 'START_AI_TASK') {
    if (event.data.prompt) document.getElementById('prompt').value = event.data.prompt;
    if (event.data.system) document.getElementById('system').value = event.data.system;
    runQuery();
  }
});

// ── 初始化 ──
loadFromUrl();
['prompt','system','model','temp'].forEach(id => {
  document.getElementById(id).addEventListener('input', updateUrlPreview);
});
updateUrlPreview();
</script>
</body>
</html>
